services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder
    command: sh -c "npx prisma db push --schema=packages/database/prisma/schema.prisma && npx prisma db seed --schema=packages/database/prisma/schema.prisma && npm run dev --workspace=@pulse/api"
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:/app/data/pulse.db
      - PORT=5000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/database/node_modules
      - pulse_dev_data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: npm run dev --workspace=@pulse/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
      - /app/packages/database/node_modules
    depends_on:
      - api

volumes:
  pulse_dev_data:
